<script>
function playZenChime() {
    try {
        var ctx = new (window.AudioContext || window.webkitAudioContext)();
        [
            { f: 110,  t: 0,    v: 0.45, d: 4.0 },
            { f: 220,  t: 0.06, v: 0.30, d: 3.5 },
            { f: 330,  t: 0.14, v: 0.22, d: 3.0 },
            { f: 440,  t: 0.26, v: 0.16, d: 2.5 },
            { f: 660,  t: 0.45, v: 0.10, d: 2.0 },
            { f: 880,  t: 0.70, v: 0.06, d: 1.8 },
            { f: 1320, t: 1.00, v: 0.04, d: 1.5 },
        ].forEach(function(n) {
            var osc  = ctx.createOscillator();
            var gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.type = 'sine';
            osc.frequency.value = n.f;
            var s = ctx.currentTime + n.t;
            gain.gain.setValueAtTime(0, s);
            gain.gain.linearRampToValueAtTime(n.v, s + 0.012);
            gain.gain.exponentialRampToValueAtTime(0.0001, s + n.d);
            osc.start(s);
            osc.stop(s + n.d);
        });
    } catch(e) {}
}

function startDemo() {
    playZenChime();
    var splash       = document.getElementById('splash');
    var videoSection = document.getElementById('video-section');
    var video        = document.getElementById('demo-video');
    splash.style.opacity       = '0';
    splash.style.pointerEvents = 'none';
    videoSection.classList.add('visible');
    video.volume = 0.85;
    video.play().catch(function() { showFeatures(); });
}

function showFeatures() {
    document.getElementById('video-section').classList.remove('visible');
    document.getElementById('features').classList.add('visible');
}
</script>
